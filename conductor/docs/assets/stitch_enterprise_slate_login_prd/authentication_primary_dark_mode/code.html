<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign in to DittoDatto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=Manrope:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@100..900&amp;family=Outfit:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .accent-glow:focus-within {
            box-shadow: 0 0 0 4px rgba(111, 113, 204, 0.15);
        }
        .transition-soft {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdf9d",
                        "on-tertiary-container": "#372700",
                        "on-tertiary": "#3f2e00",
                        "surface-dim": "#f1f1f7",
                        "secondary-fixed-dim": "#c5c5d3",
                        "surface": "#F8F9FD",
                        "on-primary-fixed-variant": "#3a3c94",
                        "on-surface-variant": "#464651",
                        "inverse-on-surface": "#f1f1f7",
                        "on-error-container": "#410002",
                        "on-surface": "#1A1C2E",
                        "tertiary-container": "#b48a20",
                        "surface-tint": "#5354ad",
                        "secondary": "#5c5d72",
                        "on-secondary": "#ffffff",
                        "background": "#FFFFFF",
                        "primary-fixed-dim": "#c1c1ff",
                        "surface-container-low": "#f8f9fd",
                        "inverse-surface": "#303036",
                        "outline-variant": "#c7c5d3",
                        "on-primary-container": "#09026a",
                        "on-tertiary-fixed-variant": "#5b4300",
                        "primary-container": "#e1dfff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e4e1e9",
                        "on-tertiary-fixed": "#251a00",
                        "tertiary": "#725c00",
                        "on-secondary-fixed": "#191b25",
                        "on-primary": "#ffffff",
                        "surface-container": "#eeeef5",
                        "on-error": "#ffffff",
                        "primary-fixed": "#e1dfff",
                        "secondary-container": "#e1e1f0",
                        "surface-container-highest": "#e4e1e9",
                        "surface-bright": "#fdfbff",
                        "primary": "#6F71CC",
                        "on-background": "#1A1C2E",
                        "surface-variant": "#e4e2f1",
                        "on-secondary-container": "#191b2c",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#efc052",
                        "outline": "#777682",
                        "on-secondary-fixed-variant": "#444652",
                        "secondary-fixed": "#e1e1f0",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#c1c1ff",
                        "on-primary-fixed": "#09026a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "12px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "xl": "64px",
                        "margin": "32px",
                        "base": "4px",
                        "md": "24px",
                        "sm": "16px",
                        "lg": "40px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Outfit"],
                        "body-md": ["Manrope"],
                        "headline-md": ["Outfit"],
                        "label-md": ["Manrope"],
                        "display-lg": ["Outfit"],
                        "body-sm": ["Manrope"],
                        "headline-lg": ["Outfit"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container" style="background-color: #0B0D14; color: #F1F2F8;">
<!-- TopAppBar - Suppressed for Login according to Semantic Shell Mandate -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter py-xl">
<div class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Authentication Card -->
<div class="bg-surface border border-outline-variant rounded-xl shadow-xl shadow-surface-container-high/20 p-lg md:p-xl transition-soft" style="background-color: #161822; border-color: #2D303E;">
<!-- Brand Anchor -->
<div class="flex justify-center mb-lg">
<div class="w-[48px] h-[48px] bg-primary rounded-lg flex items-center justify-center text-on-primary shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[32px]">storefront</span>
</div>
</div>
<!-- Header -->
<div class="text-center mb-lg">
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs" style="color: #F1F2F8;">Sign in to DittoDatto</h1>
<p class="text-on-surface-variant font-body-sm" style="color: #A1A3B5;">Welcome back. Enter your credentials to access your portal.</p>
</div>
<!-- Form -->
<form class="space-y-md" onsubmit="event.preventDefault();">
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant" for="email" style="color: #A1A3B5;">Work Email</label>
<div class="relative accent-glow rounded-lg transition-soft">
<input class="w-full bg-surface-container-lowest border border-outline px-sm py-sm rounded-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 outline-none transition-soft" id="email" placeholder="name@company.com" style="background-color: #0B0D14; border-color: #464651; color: #F1F2F8;" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-on-surface-variant" for="password" style="color: #A1A3B5;">Password</label>
<a class="font-label-md text-primary hover:underline transition-soft" href="#">Forgot password?</a>
</div>
<div class="relative accent-glow rounded-lg transition-soft">
<input class="w-full bg-surface-container-lowest border border-outline px-sm py-sm rounded-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 outline-none transition-soft" id="password" placeholder="••••••••" style="background-color: #0B0D14; border-color: #464651; color: #F1F2F8;" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" style="color: #A1A3B5;" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-xs pt-xs">
<input class="w-4 h-4 rounded border-outline text-primary focus:ring-primary/20 transition-soft" id="remember" type="checkbox"/>
<label class="font-body-sm text-on-surface-variant cursor-pointer" for="remember" style="color: #A1A3B5;">Remember this device</label>
</div>
<button class="w-full bg-primary text-on-primary font-label-md py-sm rounded-lg hover:brightness-110 active:scale-[0.98] transition-soft shadow-lg shadow-primary/20 flex items-center justify-center gap-xs mt-md" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
<div class="relative flex justify-center text-label-md"><span class="bg-surface px-sm text-on-surface-variant" style="background-color: #161822; color: #A1A3B5;">OR CONTINUE WITH</span></div>
</div>
<!-- SSO Button -->
<button class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md py-sm rounded-lg hover:bg-surface-container-high active:scale-[0.98] transition-soft flex items-center justify-center gap-xs" style="background-color: #0B0D14; border-color: #2D303E; color: #F1F2F8;">
<span class="material-symbols-outlined text-[20px]">id_card</span>
                    Single Sign-On (SSO)
                </button>
</div>
<!-- Contextual Help -->
<p class="text-center mt-lg font-body-sm text-on-surface-variant" style="color: #A1A3B5;">
                New to DittoDatto? <a class="text-primary font-bold hover:underline transition-soft" href="#">Create an account</a>
</p>
</div>
</main>
<!-- Shared Footer Component -->
<footer class="bg-surface-container-lowest border-t border-outline-variant flex flex-col md:flex-row justify-between items-center px-gutter py-md w-full gap-xs" style="background-color: #0B0D14; border-top-color: #2D303E;">
<div class="font-label-md text-label-md uppercase tracking-wider text-on-surface-variant" style="color: #A1A3B5;">
            DITTODATTO
        </div>
<div class="flex flex-wrap justify-center gap-md">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors underline opacity-80 hover:opacity-100" href="#" style="color: #A1A3B5;">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors underline opacity-80 hover:opacity-100" href="#" style="color: #A1A3B5;">Terms of Service</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors underline opacity-80 hover:opacity-100" href="#" style="color: #A1A3B5;">Merchant Support</a>
</div>
<div class="font-body-sm text-body-sm text-on-surface-variant" style="color: #A1A3B5;">
            © 2024 DittoDatto Inc. All rights reserved.
        </div>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Simple enter key handling for focus states
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('accent-glow');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('accent-glow');
            });
        });
    </script>
</body></html>
