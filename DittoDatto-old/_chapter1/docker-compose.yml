version: '3.8'

services:
  # Firebase Emulators (Firestore, Auth, Functions, Storage)
  firebase-emulators:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    container_name: firebase-emulators
    ports:
      - "4000:4000"   # Emulator UI
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
      - "5001:5001"   # Functions (if you still use them)
      - "9199:9199"   # Storage
    volumes:
      - ./firebase:/app/firebase
      - ./firestore.rules:/app/firestore.rules
      - ./storage.rules:/app/storage.rules
      - ./firestore.indexes.json:/app/firestore.indexes.json
    environment:
      - GCLOUD_PROJECT=cs-poc-4zmxog23jmy4io0d4yx6rj0
    networks:
      - dittodatto-net

  # MercuryEngine - Standalone booking microservice
  mercury-engine:
    build:
      context: .
      dockerfile: Dockerfile.mercury-engine.dev
    container_name: mercury-engine
    ports:
      - "5002:5002"   # HTTP API
    volumes:
      # Mount source for hot-reload with tsx watch
      - ./packages/mercury-engine/src:/app/src
      - ./packages/mercury-engine/package.json:/app/package.json
      - ./packages/mercury-engine/tsconfig.json:/app/tsconfig.json
      - ./packages/shared-types:/app/shared-types
    environment:
      - PORT=5002
      - NODE_ENV=development
      - GCLOUD_PROJECT=cs-poc-4zmxog23jmy4io0d4yx6rj0
      - FIRESTORE_EMULATOR_HOST=firebase-emulators:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulators:9099
    depends_on:
      - firebase-emulators
    networks:
      - dittodatto-net

networks:
  dittodatto-net:
    driver: bridge
