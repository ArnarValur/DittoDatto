name: booking_ui
description: >-
  Shared booking flow UI package for DittoDatto.
  5-step booking journey: service selection → staff → date/time → review → payment.
  Consumed by the Marketplace app, future-proofed for Business Portal.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.11.3
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  establishment_ui:
    path: ../establishment_ui
  ditto_design:
    path: ../ditto_design
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
