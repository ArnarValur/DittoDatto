name: discovery_service
description: >-
  Shared discovery layer for DittoDatto. Reads listings/categories/areas
  from companies/discovery and writes listing sync on publish.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.3
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  surrealdb: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
